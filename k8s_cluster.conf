# =============================================================================
# k8s_cluster.conf — Cluster configuration file
# Source this file or copy values into k8s_cluster_setup.sh before running
# =============================================================================

# ── Node IPs ──────────────────────────────────────────────────────────────────
CONTROL_PLANE_IP="192.168.1.10"
WORKER_IPS=("192.168.1.11" "192.168.1.12" "192.168.1.13")

# ── SSH ───────────────────────────────────────────────────────────────────────
SSH_USER="ubuntu"
SSH_KEY_PATH="${HOME}/.ssh/k8s_cluster_rsa"

# ── Kubernetes ────────────────────────────────────────────────────────────────
K8S_VERSION="1.31"          # Major.minor only (e.g. 1.31)
POD_CIDR="10.244.0.0/16"   # 10.244.0.0/16 for Flannel; 192.168.0.0/16 for Calico
CNI_PLUGIN="flannel"        # flannel | calico

# ── NVIDIA ────────────────────────────────────────────────────────────────────
INSTALL_NVIDIA="true"
NVIDIA_DRIVER_VERSION="590"     # 525 | 535 | 550 | 560 | 565 | 570 | 580 | 590 (latest)
NVIDIA_OPEN_KERNEL="false"      # true = nvidia-driver-*-open (Turing+ recommended, Blackwell required)
NVIDIA_FABRIC_MANAGER="auto"    # auto | true | false — for NVLink/NVSwitch multi-GPU (DGX/HGX/SXM)
NVIDIA_REBOOT_TIMEOUT="300"     # seconds to wait per node for SSH to return after driver reboot

# ── NFS ───────────────────────────────────────────────────────────────────────
NFS_SERVER_IP="192.168.1.10"   # Can be control plane or separate server
NFS_PATH="/srv/nfs/k8s"

# ── Monitoring ────────────────────────────────────────────────────────────────
GRAFANA_ADMIN_PASSWORD="ChangeMe123!"
PROM_STACK_VERSION="65.1.0"

# ── Helm ──────────────────────────────────────────────────────────────────────
HELM_VERSION="3.16.2"

# ── Namespaces ────────────────────────────────────────────────────────────────
NS_MONITORING="monitoring"
NS_GPU_OPERATOR="gpu-operator"
NS_NFS="nfs-provisioner"
